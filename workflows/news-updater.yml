name: Автообновление новостей

on:
  schedule:
    # Каждые 10 минут
    - cron: '*/10 * * * *'
  # Можно запустить вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Установка зависимостей
        run: |
          pip install requests feedparser
          # Если есть Groq API ключ, установим и его
          if [ -n "${{ secrets.GROQ_API_KEY }}" ]; then
            pip install groq
          fi
      
      - name: 🚀 Запуск генератора новостей
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python news_generator.py
      
      - name: 💾 Сохранение изменений
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Автообновление новостей [skip ci]"
          git push
