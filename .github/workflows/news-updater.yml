name: Автообновление новостей

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Установка зависимостей
        run: |
          pip install requests feedparser
      
      - name: Запуск генератора новостей
        run: python news_generator.py
      
      - name: Сохранение изменений
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Проверяем, есть ли изменения
          if git diff --quiet news.json; then
            echo "Нет изменений в news.json"
            exit 0
          fi
          
          # Добавляем и коммитим
          git add news.json
          git commit -m "🤖 Автообновление новостей [skip ci]"
          
          # Пул и пуш в одной команде
          git pull --rebase origin main
          git push origin main
