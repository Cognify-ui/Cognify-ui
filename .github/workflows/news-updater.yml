name: Автообновление новостей

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Важно! Загружаем всю историю
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Установка зависимостей
        run: |
          pip install requests feedparser
      
      - name: Запуск генератора новостей
        run: python news_generator.py
      
      - name: Сохранение изменений
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Скачиваем последние изменения из репозитория
          git pull --rebase origin main
          
          # Добавляем изменения
          git add news.json
          
          # Коммитим только если есть изменения
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "🤖 Автообновление новостей [skip ci]"
            git push origin main
          fi
